<!DOCTYPE html>
<html lang="ar" dir="rtl">

        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(255, 140, 0, 0.3);

            border: 3px solid #8b6508;
            border-radius: 15px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, img {
            width: 100%;
            height: 100%;

        }

            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            width: 100%;
        }

        .hacked-text {
            font-size: 0.85rem;
            color: #aa3333;
            margin-bottom: 15px;
        }

        .action-btn {
            display: inline-block;
            background: linear-gradient(180deg, #d4af37 0%, #8b6508 100%);
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px 35px;
            border: 2px solid #ffd700;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
        }

</head>
